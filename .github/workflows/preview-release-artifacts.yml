name: Preview release artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Preview version to package, for example 0.2.1-preview"
        required: true
        default: "0.2.1-preview"

permissions:
  contents: read

jobs:
  macos-preview-artifacts:
    name: macOS preview artifacts
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Ensure scripts are executable
        run: chmod +x ./scripts/*.sh

      - name: Create and verify macOS preview release assets
        env:
          RUN_TESTS: "false"
        run: ./scripts/create-macos-preview-release-assets.sh "${{ inputs.version }}" all

      - name: Upload macOS preview release files
        uses: actions/upload-artifact@v4
        with:
          name: glucodesk-${{ inputs.version }}-macos-preview-artifacts
          compression-level: 0
          if-no-files-found: error
          path: |
            artifacts/macos/${{ inputs.version }}/*.txt
            artifacts/macos/${{ inputs.version }}/osx-arm64/*.dmg
            artifacts/macos/${{ inputs.version }}/osx-arm64/*.zip
            artifacts/macos/${{ inputs.version }}/osx-arm64/*.sha256
            artifacts/macos/${{ inputs.version }}/osx-x64/*.dmg
            artifacts/macos/${{ inputs.version }}/osx-x64/*.zip
            artifacts/macos/${{ inputs.version }}/osx-x64/*.sha256

  windows-preview-artifacts:
    name: Windows preview artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Restore
        shell: pwsh
        run: dotnet restore

      - name: Build
        shell: pwsh
        run: dotnet build -c Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test -c Release --no-build

      - name: Create Windows preview release assets
        shell: pwsh
        run: '.\scripts\create-windows-preview-release-assets.ps1 -Version "${{ inputs.version }}"'

      - name: Verify Windows preview artifacts
        shell: pwsh
        run: '.\scripts\verify-windows-preview-artifacts.ps1 -Version "${{ inputs.version }}"'

      - name: Upload Windows preview release files
        uses: actions/upload-artifact@v4
        with:
          name: glucodesk-${{ inputs.version }}-windows-preview-artifacts
          compression-level: 0
          if-no-files-found: error
          path: |
            artifacts/windows/${{ inputs.version }}/*.txt
            artifacts/windows/${{ inputs.version }}/*.md
            artifacts/windows/${{ inputs.version }}/*.sha256
            artifacts/windows/${{ inputs.version }}/*.exe
            artifacts/windows/${{ inputs.version }}/*.zip
            artifacts/windows/${{ inputs.version }}/**/*.sha256
            artifacts/windows/${{ inputs.version }}/**/*.exe
            artifacts/windows/${{ inputs.version }}/**/*.zip
